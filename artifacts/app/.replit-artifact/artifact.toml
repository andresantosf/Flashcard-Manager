kind = "mobile"
previewPath = "/"
title = "App"
version = "1.0.0"
id = "artifacts/app"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 22580

[services.development]
run = "pnpm --filter @workspace/app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/app", "run", "serve" ]

[services.env]
PORT = "22580"
BASE_PATH = "/"
