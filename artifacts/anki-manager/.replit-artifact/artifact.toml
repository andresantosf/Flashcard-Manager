kind = "mobile"
previewPath = "/"
title = "Anki Card Manager"
version = "1.0.0"
id = "artifacts/anki-manager"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 18947

[services.development]
run = "pnpm --filter @workspace/anki-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anki-manager", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/anki-manager", "run", "serve" ]

[services.env]
PORT = "18947"
BASE_PATH = "/"
